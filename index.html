    <title>Nimmane.shop | AI E-Commerce Automation</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid #334155;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        .tagline {
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
        }
        p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 1rem;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            background-color: var(--accent);
            color: #0f172a;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
